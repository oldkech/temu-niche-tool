<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temu Niche Builder</title>
  <link rel="stylesheet" href="popup.css" />
  <style>
    .terminal-section{padding:4px 12px 8px}
    .terminal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .terminal-header span{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .btn-clear-log{background:none;border:none;color:#64748b;font-size:10px;cursor:pointer;padding:2px 6px;border-radius:3px}
    .btn-clear-log:hover{color:#f97316}
    .terminal-log{background:#0d1117;border:1px solid #1e2937;border-radius:6px;padding:8px;height:110px;overflow-y:auto;font-family:monospace;font-size:11px;color:#7dd3fc;word-break:break-all}
    .terminal-log div{line-height:1.6}
    .terminal-log .log-success{color:#4ade80}
    .terminal-log .log-error{color:#f87171}
    .terminal-log .log-warn{color:#fbbf24}
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <h1>🛍️ Temu Niche Builder</h1>
    <span id="product-counter" class="badge">0 products</span>
  </header>

  <!-- Product list -->
  <section class="section">
    <div id="empty-state" class="empty-state">
      <p>No products selected yet.</p>
      <p class="hint">Browse a Temu product page and click<br><strong>✓ Add to Niche Page</strong></p>
    </div>
    <ul id="product-list"></ul>
  </section>

  <!-- Generation options -->
  <section class="section options">
    <label for="site-select">Publish To</label>
    <select id="site-select">
      <option value="couponhubusa.com">couponhubusa.com</option>
      <option value="couponcodesglitch.com">couponcodesglitch.com</option>
      <option value="both">both (publish to both sites)</option>
    </select>
  </section>

  <!-- Actions -->
  <section class="section actions">
    <button id="generate-btn" class="btn-generate">⚡ Generate &amp; Publish Page</button>
    <button id="cancel-btn" class="btn-cancel hidden">✕ Cancel / Reset</button>
    <button id="clear-btn" class="btn-clear">🗑 Clear All</button>
  </section>

  <!-- Status -->
  <div id="status" class="status hidden"></div>

  <!-- Terminal log -->
  <section class="section terminal-section">
    <div class="terminal-header">
      <span>Status Log</span>
      <button id="clear-log-btn" class="btn-clear-log">clear</button>
    </div>
    <div id="terminal-log" class="terminal-log"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
